# ORE outreach playbook for fractional_cto_v1 (Issue #189)
# Extracted from app/services/ore/draft_generator
#
# The "X name:" line in the ORE prompt (e.g. "Founder name: {{NAME}}") is controlled by
# pack taxonomy.recipient_label (Issue #121 M3). Set in packs/fractional_cto_v1/taxonomy.yaml;
# when absent, ORE uses "Contact". See docs/pack_v2_contract.md.

pattern_frames:
  momentum: "When a team's pace picks up, tech decisions that worked earlier can start costing more."
  complexity: "When products add integrations/AI/enterprise asks, systems often need a stabilization pass."
  pressure: "When timelines get tighter, it helps to reduce decision load and get a clean plan."
  leadership_gap: "When there isn't a dedicated technical owner yet, teams often benefit from a short-term systems guide."

value_assets:
  - "2-page Tech Inflection Checklist"
  - "30-minute 'what's breaking next' map"
  - "5 questions to reduce tech chaos"

ctas:
  - "Want me to send that checklist?"
  - "Open to a 15-min compare-notes call?"
  - "If helpful, I can share a one-page approach—want it?"

# Optional (Issue #176 M3): phrases the critic must flag in drafts (in addition to core rules)
forbidden_phrases: []

# Optional (Issue #176 M5): tier-specific tone instructions for the draft prompt.
# Keys match recommendation_type (e.g. Soft Value Share, Low-Pressure Intro).
# Pipeline passes the entry for the current tier as tone_definition; generic instruction from tone_constraint is added separately.
tone:
  "Soft Value Share": "Use only gentle framing; no direct ask."
  "Low-Pressure Intro": "Brief intro and pattern only; one small next step."
  "Standard Outreach": "Propose a short call tied to a problem frame; still consent-based."
  "Direct Strategic Outreach": "Specific positioning; direct ask; remain consent-based and not urgent."
  default: "Match the maximum outreach tier above."
